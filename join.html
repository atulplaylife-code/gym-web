<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Join Now Section</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .join-section {
      background: linear-gradient(135deg, #00bcd4, #0097a7);
      text-align: center;
      padding: 60px 20px;
      color: #fff;
    }

    .join-section h2 {
      font-size: 36px;
      margin-bottom: 15px;
    }

    .join-section p {
      font-size: 18px;
      margin-bottom: 30px;
      color: #f0f0f0;
    }

    .join-btn {
      display: inline-block;
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      background: #111;
      color: #00bcd4;
      border: 2px solid #fff;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
    }

    .join-btn:hover {
      background: #fff;
      color: #111;
    }
  </style>
</head>
<body>

  <!-- Join Now Section -->
  <section class="join-section" id="join">
    <h2>Ready to Transform Your Body?</h2>
    <p>Join our gym today and start your fitness journey with expert trainers and modern equipment.</p>
    <a href="login.html" class="join-btn">Join Now</a>
  </section>

  <!-- Example Signup Section -->
  <section id="signup" style="padding:40px; text-align:center;">
    <h2>Signup Form</h2>
    <p>This is where your signup form will go.</p>
  </section>

</body>
</html>
